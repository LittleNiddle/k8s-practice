server:
  port: 0

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

spring:
  config:
    activate:
      on-profile: local
  application:
    name: product-service

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://localhost:3306/ordermsa
    username: root
    password: test1234
  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MariaDBDialect
    generate-ddl: true
    hibernate:
      ddl-auto: create
    show_sql: true
  redis:
    host: localhost
    port: 6379

  kafka:
    kafka-server: localhost:9092
    consumer:
#      kafka에서 그룹ID는 consumer group을 식별하는 ID로써, 동일한 그룹ID를 가진 consumer들은 메시지를 분담해서 consume
      group-id: product-group

aws:
  credentials:
    access-key: xxxxx
    secret-key: xxxxx
  region: ap-northeast-2
  s3:
    bucket1: littleniddle-board-profile-image