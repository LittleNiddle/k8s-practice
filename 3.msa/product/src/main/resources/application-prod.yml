server:
  port: 8080

eureka:
  client:
    enabled: false

spring:
  config:
    activate:
      on-profile: prod
  application:
    name: product-service

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${DB_HOST}:3306/ordermsa?useSSL=true
    username: admin
    password: ${DB_PW}
    #    운영 DB의 낮은 스펙과 msa의 많은 커넥션을 감안한 커넥션 축소 설정
    hikari:
      maximum-pool-size: 1
  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MariaDBDialect
    generate-ddl: true
    hibernate:
      ddl-auto: create
    show_sql: true
  redis:
    host: redis-service
    port: 6379

  kafka:
    kafka-server: kafka-service:9092
    consumer:
#      kafka에서 그룹ID는 consumer group을 식별하는 ID로써, 동일한 그룹ID를 가진 consumer들은 메시지를 분담해서 consume
      group-id: product-group

aws:
  credentials:
    access-key: xxxxx
    secret-key: xxxxx
  region: ap-northeast-2
  s3:
    bucket1: littleniddle-board-profile-image